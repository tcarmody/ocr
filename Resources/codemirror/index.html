<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Humanist Source Editor</title>
  <link rel="stylesheet" href="codemirror.css">
  <link rel="stylesheet" href="addon/dialog/dialog.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: -apple-system-textBackgroundColor;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .CodeMirror {
      height: 100%;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    /* Dialog styling — match macOS find bar visually. */
    .CodeMirror-dialog {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
    }
    .CodeMirror-dialog input {
      font-family: inherit;
      font-size: inherit;
    }
    /* Brief highlight when the editor is jumped to an anchor by
       linked-navigation (PDF page change / preview scroll). */
    .CodeMirror-line.hu-flash-line {
      background: rgba(255, 230, 0, 0.45);
      transition: background 1.0s ease-out;
    }
    @media (prefers-color-scheme: dark) {
      .CodeMirror-line.hu-flash-line {
        background: rgba(120, 100, 0, 0.55);
      }
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; color: #d4d4d4; }
      .CodeMirror { background: #1e1e1e; color: #d4d4d4; }
      .CodeMirror-gutters { background: #1e1e1e; border-right: 1px solid #333; }
      .CodeMirror-linenumber { color: #6a6a6a; }
      .CodeMirror-cursor { border-left-color: #d4d4d4 !important; }
      .CodeMirror-dialog {
        background: rgba(40, 40, 40, 0.95);
        color: #d4d4d4;
        border-bottom-color: rgba(255, 255, 255, 0.15);
      }
      .CodeMirror-dialog input {
        background: #2c2c2c;
        color: #d4d4d4;
        border: 1px solid #555;
      }
    }
  </style>
  <script src="codemirror.js"></script>
  <script src="mode/xml/xml.js"></script>
  <script src="mode/css/css.js"></script>
  <script src="mode/javascript/javascript.js"></script>
  <script src="mode/htmlmixed/htmlmixed.js"></script>
  <script src="addon/search/searchcursor.js"></script>
  <script src="addon/search/search.js"></script>
  <script src="addon/search/jump-to-line.js"></script>
  <script src="addon/dialog/dialog.js"></script>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    (function () {
      // Bridge between Swift and CodeMirror.
      //
      // Swift → JS:
      //   * humanistSetContent(text, mode) — push file contents.
      //   * humanistGetContent() — pull current text.
      //   * humanistFocusFind() — open the search dialog.
      //
      // JS → Swift (via window.webkit.messageHandlers.humanist):
      //   * { type: "ready" }     — DOM + CodeMirror constructed.
      //   * { type: "edit", text } — user typed; text is the full doc.
      //   * { type: "focus" }     — editor took focus (for menu enable).
      var textarea = document.getElementById("editor");
      var editor = CodeMirror.fromTextArea(textarea, {
        lineNumbers: true,
        mode: "xml",
        viewportMargin: Infinity,
        lineWrapping: true,
        indentUnit: 2,
        tabSize: 2,
        styleActiveLine: false,
        autoCloseTags: false,
        // `contenteditable` input style is required for browser
        // spellcheck (red squiggles) to work — the default
        // `textarea` style routes typing through a hidden textarea
        // that the renderer doesn't see. Browser-side spellcheck
        // only fires on the visible contenteditable surface.
        inputStyle: "contenteditable",
        spellcheck: true,
        // Search/find UI uses these key bindings out of the box once
        // search.js is loaded: ⌘F (find), ⌘G (next), ⇧⌘G (prev),
        // ⌥⌘F (replace). Menu items in the macOS Edit menu route
        // through `humanistFocusFind` / `humanistFindNext` /
        // `humanistFindPrev` / `humanistFocusReplace` because
        // SwiftUI's default Edit > Find group otherwise eats the
        // shortcuts before they reach the WebView.
      });

      var suppressEditEvent = false;
      var ready = false;

      function post(message) {
        try {
          if (window.webkit && window.webkit.messageHandlers
              && window.webkit.messageHandlers.humanist) {
            window.webkit.messageHandlers.humanist.postMessage(message);
          }
        } catch (err) {
          // No host (e.g. opened in a regular browser for debugging).
        }
      }

      editor.on("change", function () {
        if (suppressEditEvent) return;
        post({ type: "edit", text: editor.getValue() });
      });

      editor.on("focus", function () {
        post({ type: "focus" });
      });

      window.humanistSetContent = function (text, mode) {
        suppressEditEvent = true;
        try {
          if (mode && editor.getOption("mode") !== mode) {
            editor.setOption("mode", mode);
          }
          if (editor.getValue() !== text) {
            editor.setValue(text);
            editor.clearHistory();
          }
        } finally {
          suppressEditEvent = false;
        }
        // Force a layout pass — without this CodeMirror may render with
        // stale dimensions when the WKWebView's frame was zero at first
        // load.
        editor.refresh();
      };

      window.humanistGetContent = function () {
        return editor.getValue();
      };

      window.humanistFocusFind = function () {
        // CodeMirror's "find" command is registered by search.js.
        editor.execCommand("find");
      };

      // Find next / previous match. Cycles through matches once a
      // search is active. When no search has run yet, behaves the
      // same as opening the find dialog.
      window.humanistFindNext = function () {
        editor.execCommand("findNext");
      };
      window.humanistFindPrev = function () {
        editor.execCommand("findPrev");
      };

      // Open the find-and-replace dialog. CodeMirror's `replace`
      // command surfaces a multi-line dialog with separate
      // "find" and "replace" fields, plus per-match Yes/No/All
      // confirmation. Bound to ⌥⌘F in the Edit menu.
      window.humanistFocusReplace = function () {
        editor.execCommand("replace");
      };

      window.humanistRefresh = function () {
        editor.refresh();
      };

      // Replace whatever's selected in the editor with `text`, or
      // insert at the cursor if there's no selection. Used by the
      // Re-OCR sheet's "Replace in Source" button so the user
      // doesn't have to round-trip through the system clipboard.
      window.humanistReplaceSelection = function (text) {
        if (typeof text !== "string") return;
        editor.replaceSelection(text, "around");
        editor.focus();
      };

      // Wrap the current selection (or insert at the cursor) with
      // `opening` and `closing` strings. Used by the source pane's
      // formatting toolbar — Bold, Italic, Heading, Blockquote, etc.
      // Selected: "lorem" + ("<strong>", "</strong>") → "<strong>lorem</strong>"
      // Empty:    cursor + ("<em>", "</em>")          → "<em>|</em>" (caret between)
      window.humanistWrapSelection = function (opening, closing) {
        if (typeof opening !== "string" || typeof closing !== "string") return;
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        if (sel.length > 0) {
          doc.replaceSelection(opening + sel + closing, "around");
        } else {
          var pos = doc.getCursor();
          doc.replaceRange(opening + closing, pos);
          // Place caret between the tags so the user can type into
          // the empty wrapper.
          doc.setCursor({line: pos.line, ch: pos.ch + opening.length});
        }
        editor.focus();
      };

      // Wrap the current selection as a list. Each non-empty
      // newline-separated line becomes a `<li>...</li>`; the whole
      // run is enclosed in `<ul>` or `<ol>`. With nothing selected,
      // inserts a one-item list with the caret inside the empty
      // `<li>`.
      window.humanistWrapAsList = function (listType) {
        if (listType !== "ul" && listType !== "ol") return;
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        var inner;
        if (sel.length > 0) {
          var lines = sel.split("\n")
            .map(function (l) { return l.trim(); })
            .filter(function (l) { return l.length > 0; });
          if (lines.length === 0) lines = [""];
          inner = lines.map(function (l) {
            return "  <li>" + l + "</li>";
          }).join("\n");
        } else {
          inner = "  <li></li>";
        }
        var wrapped = "<" + listType + ">\n" + inner + "\n</" + listType + ">";
        if (sel.length > 0) {
          doc.replaceSelection(wrapped, "around");
        } else {
          var pos = doc.getCursor();
          doc.replaceRange(wrapped, pos);
          // Place caret inside the (empty) first <li>.
          doc.setCursor({line: pos.line + 1, ch: 6});  // "  <li>"
        }
        editor.focus();
      };

      // Insert raw `text` at the cursor (replacing selection if any).
      // Used for self-closing inserts — e.g. <hr/> from the toolbar —
      // where the wrap-with-opening/closing shape doesn't apply.
      window.humanistInsertAtCursor = function (text) {
        if (typeof text !== "string") return;
        editor.replaceSelection(text, "end");
        editor.focus();
      };

      // Replace the entire body of a single page — text between the
      // closing `>` of `<span id="hu-page-N" …>` and the start of
      // `<span id="hu-page-N+1" …>` (or end of body, for the last
      // page). Used by the Re-OCR sheet's "Replace Page in Source"
      // button.
      //
      // `payload` is well-formed XHTML produced by Swift's
      // XHTMLFragmentRenderer (the same renderer EPUBBuilder uses for
      // chapters), so it already has <p> wrappers, language spans,
      // noteref links, etc. We just splice it in verbatim — no need
      // to wrap or escape further. (Earlier versions wrapped each
      // line in <p> here, which produced gibberish on multi-column
      // pages because the OCR text wasn't reflowed.)
      window.humanistReplacePageInSource = function (anchorId, payload) {
        if (!anchorId || typeof payload !== "string") return;
        var doc = editor.getDoc();
        var content = doc.getValue();
        var startNeedles = ['id="' + anchorId + '"', "id='" + anchorId + "'"];
        var startIdx = -1;
        for (var i = 0; i < startNeedles.length; i++) {
          var hit = content.indexOf(startNeedles[i]);
          if (hit >= 0) { startIdx = hit; break; }
        }
        if (startIdx < 0) return;
        // Skip past the opening tag's closing `>` so we don't
        // overwrite the anchor span itself.
        var startEnd = content.indexOf(">", startIdx);
        if (startEnd < 0) return;
        startEnd += 1;
        // Find the next hu-page anchor (any id starting with
        // `hu-page-`) — that's where this page's body ends.
        var nextRe = /<span[^>]*id=["']hu-page-\d+["'][^>]*>/g;
        nextRe.lastIndex = startEnd;
        var nextMatch = nextRe.exec(content);
        var endIdx = nextMatch ? nextMatch.index : content.length;

        // Pad with newlines so the splice sits cleanly between the
        // anchor spans rather than smashed against them.
        var spliced = "\n" + payload.replace(/^\n+|\n+$/g, "") + "\n";
        var startPos = doc.posFromIndex(startEnd);
        var endPos = doc.posFromIndex(endIdx);
        doc.replaceRange(spliced, startPos, endPos);
        editor.focus();
      };

      // Linked-navigation: search the source for the given anchor id
      // (matches `id="hu-page-N"` produced by the converter), move the
      // cursor there, and briefly flash the line so the jump is
      // visible.
      var lastReportedAnchor = null;

      window.humanistScrollToAnchor = function (anchorId) {
        if (!anchorId) return;
        var doc = editor.getDoc();
        var content = doc.getValue();
        // Try double quotes first (the canonical form the XHTML
        // writer emits), then fall back to single quotes for hand-
        // edited files.
        var needles = ['id="' + anchorId + '"', "id='" + anchorId + "'"];
        var idx = -1;
        for (var i = 0; i < needles.length; i++) {
          var hit = content.indexOf(needles[i]);
          if (hit >= 0) { idx = hit; break; }
        }
        if (idx < 0) return;
        var pos = doc.posFromIndex(idx);
        // Move cursor and scroll the target line ~100px from the top
        // so context above the anchor is still visible.
        // Stash the anchor as the most recently reported one so the
        // cursorActivity handler doesn't echo it back as a sync.
        lastReportedAnchor = anchorId;
        doc.setSelection(pos, pos);
        editor.scrollIntoView(pos, 100);
        // Flash the line briefly. CodeMirror's addLineClass returns
        // a handle we use to remove the class after the flash.
        var line = pos.line;
        var handle = doc.addLineClass(line, "background", "hu-flash-line");
        setTimeout(function () {
          if (handle) doc.removeLineClass(handle, "background", "hu-flash-line");
        }, 1100);
      };

      // Code → others sync: when the cursor moves, find the nearest
      // hu-page anchor that appears BEFORE the cursor and report it
      // so the PDF + preview can follow. Suppresses the report when
      // the change is the result of an external scroll (the
      // `lastReportedAnchor` guard).
      var anchorRegex = /id=["']hu-page-(\d+)["']/g;
      function anchorAtCursor() {
        var doc = editor.getDoc();
        var idx = doc.indexFromPos(doc.getCursor());
        var content = doc.getValue();
        // Walk forward through matches, keeping the last one whose
        // starting offset is <= cursor. Faster than .match() then
        // searching backwards for long files.
        anchorRegex.lastIndex = 0;
        var lastId = null;
        var m;
        while ((m = anchorRegex.exec(content)) !== null) {
          if (m.index > idx) break;
          lastId = "hu-page-" + m[1];
        }
        return lastId;
      }
      editor.on("cursorActivity", function () {
        var current = anchorAtCursor();
        if (!current || current === lastReportedAnchor) return;
        lastReportedAnchor = current;
        post({ type: "cursor-anchor", id: current });
      });

      ready = true;
      post({ type: "ready" });
    })();
  </script>
</body>
</html>
