<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Humanist Source Editor</title>
  <link rel="stylesheet" href="codemirror.css">
  <link rel="stylesheet" href="addon/dialog/dialog.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: -apple-system-textBackgroundColor;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .CodeMirror {
      height: 100%;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    /* Dialog styling — match macOS find bar visually. */
    .CodeMirror-dialog {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
    }
    .CodeMirror-dialog input {
      font-family: inherit;
      font-size: inherit;
    }
    /* Brief highlight when the editor is jumped to an anchor by
       linked-navigation (PDF page change / preview scroll). */
    .CodeMirror-line.hu-flash-line {
      background: rgba(255, 230, 0, 0.45);
      transition: background 1.0s ease-out;
    }
    @media (prefers-color-scheme: dark) {
      .CodeMirror-line.hu-flash-line {
        background: rgba(120, 100, 0, 0.55);
      }
    }
    @media (prefers-color-scheme: dark) {
      body:not(.hu-theme-light) { background: #1e1e1e; color: #d4d4d4; }
      body:not(.hu-theme-light) .CodeMirror { background: #1e1e1e; color: #d4d4d4; }
      body:not(.hu-theme-light) .CodeMirror-gutters { background: #1e1e1e; border-right: 1px solid #333; }
      body:not(.hu-theme-light) .CodeMirror-linenumber { color: #6a6a6a; }
      body:not(.hu-theme-light) .CodeMirror-cursor { border-left-color: #d4d4d4 !important; }
      body:not(.hu-theme-light) .CodeMirror-dialog {
        background: rgba(40, 40, 40, 0.95);
        color: #d4d4d4;
        border-bottom-color: rgba(255, 255, 255, 0.15);
      }
      body:not(.hu-theme-light) .CodeMirror-dialog input {
        background: #2c2c2c;
        color: #d4d4d4;
        border: 1px solid #555;
      }
    }
    /* Forced light — wins over the prefers-color-scheme dark
       block via `body.hu-theme-light` on the document body. */
    body.hu-theme-light { background: #ffffff; color: #1d1d1d; }
    body.hu-theme-light .CodeMirror { background: #ffffff; color: #1d1d1d; }
    body.hu-theme-light .CodeMirror-gutters { background: #ffffff; border-right: 1px solid #e0e0e0; }
    body.hu-theme-light .CodeMirror-linenumber { color: #b0b0b0; }
    body.hu-theme-light .CodeMirror-cursor { border-left-color: #1d1d1d !important; }
    body.hu-theme-light .CodeMirror-dialog {
      background: rgba(255, 255, 255, 0.95);
      color: #1d1d1d;
      border-bottom-color: rgba(0, 0, 0, 0.15);
    }
    body.hu-theme-light .CodeMirror-dialog input {
      background: #f5f5f5;
      color: #1d1d1d;
      border: 1px solid #ccc;
    }
    /* Forced dark — wins regardless of system setting. */
    body.hu-theme-dark { background: #1e1e1e; color: #d4d4d4; }
    body.hu-theme-dark .CodeMirror { background: #1e1e1e; color: #d4d4d4; }
    body.hu-theme-dark .CodeMirror-gutters { background: #1e1e1e; border-right: 1px solid #333; }
    body.hu-theme-dark .CodeMirror-linenumber { color: #6a6a6a; }
    body.hu-theme-dark .CodeMirror-cursor { border-left-color: #d4d4d4 !important; }
    body.hu-theme-dark .CodeMirror-dialog {
      background: rgba(40, 40, 40, 0.95);
      color: #d4d4d4;
      border-bottom-color: rgba(255, 255, 255, 0.15);
    }
    body.hu-theme-dark .CodeMirror-dialog input {
      background: #2c2c2c;
      color: #d4d4d4;
      border: 1px solid #555;
    }
  </style>
  <script src="codemirror.js"></script>
  <script src="mode/xml/xml.js"></script>
  <script src="mode/css/css.js"></script>
  <script src="mode/javascript/javascript.js"></script>
  <script src="mode/htmlmixed/htmlmixed.js"></script>
  <script src="addon/search/searchcursor.js"></script>
  <script src="addon/search/search.js"></script>
  <script src="addon/search/jump-to-line.js"></script>
  <script src="addon/dialog/dialog.js"></script>
</head>
<body>
  <textarea id="editor"></textarea>
  <script>
    (function () {
      // Bridge between Swift and CodeMirror.
      //
      // Swift → JS:
      //   * humanistSetContent(text, mode) — push file contents.
      //   * humanistGetContent() — pull current text.
      //   * humanistFocusFind() — open the search dialog.
      //
      // JS → Swift (via window.webkit.messageHandlers.humanist):
      //   * { type: "ready" }     — DOM + CodeMirror constructed.
      //   * { type: "edit", text } — user typed; text is the full doc.
      //   * { type: "focus" }     — editor took focus (for menu enable).
      var textarea = document.getElementById("editor");
      var editor = CodeMirror.fromTextArea(textarea, {
        lineNumbers: true,
        mode: "xml",
        viewportMargin: Infinity,
        lineWrapping: true,
        indentUnit: 2,
        tabSize: 2,
        styleActiveLine: false,
        autoCloseTags: false,
        // `contenteditable` input style is required for browser
        // spellcheck (red squiggles) to work — the default
        // `textarea` style routes typing through a hidden textarea
        // that the renderer doesn't see. Browser-side spellcheck
        // only fires on the visible contenteditable surface.
        inputStyle: "contenteditable",
        spellcheck: true,
        // Disable autocorrect (we don't want EPUB code-editing to
        // get retroactively retyped) but do allow autocapitalization
        // — the spellcheck attribute alone often doesn't kick in on
        // WebKit's contenteditable surface unless the related
        // attributes are also set.
        autocorrect: false,
        autocapitalize: false,
        // Search/find UI uses these key bindings out of the box once
        // search.js is loaded: ⌘F (find), ⌘G (next), ⇧⌘G (prev),
        // ⌥⌘F (replace). Menu items in the macOS Edit menu route
        // through `humanistFocusFind` / `humanistFindNext` /
        // `humanistFindPrev` / `humanistFocusReplace` because
        // SwiftUI's default Edit > Find group otherwise eats the
        // shortcuts before they reach the WebView.
      });

      // Belt-and-suspenders: explicitly set `spellcheck="true"` on
      // both the stable wrapper and the contenteditable input
      // surface so WebKit's text checker sees the attribute even if
      // CodeMirror rebuilds the inner contenteditable div on
      // structural redraws. The CM `spellcheck` option above
      // handles the input field on init; this catches the wrapper
      // (which is the focus context WKWebView's spell checker
      // looks at first) and re-applies on every focus event in
      // case the inner DOM rotated under us.
      function applySpellcheckAttribute() {
        try {
          editor.getWrapperElement().setAttribute("spellcheck", "true");
          var input = editor.getInputField();
          if (input) input.setAttribute("spellcheck", "true");
          // The contenteditable lines container — applies inheritance
          // so any newly-created child .CodeMirror-line nodes pick
          // up spellcheck without us having to track each one.
          var lines = editor.getWrapperElement().querySelector(".CodeMirror-lines");
          if (lines) lines.setAttribute("spellcheck", "true");
        } catch (e) { /* no-op on platforms where these don't exist */ }
      }
      applySpellcheckAttribute();
      // Re-apply on focus — covers the case where CodeMirror rebuilt
      // its inner DOM during the user's last edit. Cheap (just
      // attribute reads / writes) so running on every focus is fine.
      editor.on("focus", applySpellcheckAttribute);

      // Make the find / replace dialogs appear at the bottom of the
      // editor (default is top). The `dialog.js` addon supports a
      // `bottom: true` option but search.js doesn't pass it through;
      // we wrap `openDialog` / `openConfirm` to inject the option on
      // every call. Esc-to-dismiss and ⌘F-to-reopen behavior in the
      // dialog addon is unaffected.
      var originalOpenDialog = editor.openDialog;
      editor.openDialog = function (template, callback, options) {
        options = options || {};
        options.bottom = true;
        return originalOpenDialog.call(this, template, callback, options);
      };
      var originalOpenConfirm = editor.openConfirm;
      editor.openConfirm = function (template, callbacks, options) {
        options = options || {};
        options.bottom = true;
        return originalOpenConfirm.call(this, template, callbacks, options);
      };
      var originalOpenNotification = editor.openNotification;
      editor.openNotification = function (template, options) {
        options = options || {};
        options.bottom = true;
        return originalOpenNotification.call(this, template, options);
      };

      var suppressEditEvent = false;
      var ready = false;

      function post(message) {
        try {
          if (window.webkit && window.webkit.messageHandlers
              && window.webkit.messageHandlers.humanist) {
            window.webkit.messageHandlers.humanist.postMessage(message);
          }
        } catch (err) {
          // No host (e.g. opened in a regular browser for debugging).
        }
      }

      editor.on("change", function () {
        if (suppressEditEvent) return;
        post({ type: "edit", text: editor.getValue() });
      });

      editor.on("focus", function () {
        post({ type: "focus" });
      });

      window.humanistSetContent = function (text, mode) {
        suppressEditEvent = true;
        try {
          if (mode && editor.getOption("mode") !== mode) {
            editor.setOption("mode", mode);
          }
          if (editor.getValue() !== text) {
            editor.setValue(text);
            editor.clearHistory();
          }
        } finally {
          suppressEditEvent = false;
        }
        // Force a layout pass — without this CodeMirror may render with
        // stale dimensions when the WKWebView's frame was zero at first
        // load.
        editor.refresh();
      };

      window.humanistGetContent = function () {
        return editor.getValue();
      };

      window.humanistFocusFind = function () {
        // CodeMirror's "find" command is registered by search.js.
        editor.execCommand("find");
      };

      // Settings — runtime configuration from the Settings pane.
      // Each call is idempotent; the Settings sheet pushes them
      // both on file load (resetID) and on every value change.
      window.humanistSetFontSize = function (px) {
        var n = parseInt(px, 10);
        if (!n || n < 8 || n > 48) return;
        editor.getWrapperElement().style.fontSize = n + "px";
        editor.refresh();
      };
      window.humanistSetTheme = function (mode) {
        // mode ∈ "system" | "light" | "dark"
        var body = document.body;
        body.classList.remove("hu-theme-light", "hu-theme-dark");
        if (mode === "light") body.classList.add("hu-theme-light");
        if (mode === "dark")  body.classList.add("hu-theme-dark");
        editor.refresh();
      };
      window.humanistSetLineNumbers = function (on) {
        editor.setOption("lineNumbers", !!on);
      };
      window.humanistSetWordWrap = function (on) {
        editor.setOption("lineWrapping", !!on);
      };

      // Find next / previous match. Cycles through matches once a
      // search is active. When no search has run yet, behaves the
      // same as opening the find dialog.
      window.humanistFindNext = function () {
        editor.execCommand("findNext");
      };
      window.humanistFindPrev = function () {
        editor.execCommand("findPrev");
      };

      // Open the find-and-replace dialog. CodeMirror's `replace`
      // command surfaces a multi-line dialog with separate
      // "find" and "replace" fields, plus per-match Yes/No/All
      // confirmation. Bound to ⌥⌘F in the Edit menu.
      window.humanistFocusReplace = function () {
        editor.execCommand("replace");
      };

      window.humanistRefresh = function () {
        editor.refresh();
      };

      // Replace whatever's selected in the editor with `text`, or
      // insert at the cursor if there's no selection. Used by the
      // Re-OCR sheet's "Replace in Source" button so the user
      // doesn't have to round-trip through the system clipboard.
      window.humanistReplaceSelection = function (text) {
        if (typeof text !== "string") return;
        editor.replaceSelection(text, "around");
        editor.focus();
      };

      // Wrap the current selection (or insert at the cursor) with
      // `opening` and `closing` strings. Used by the source pane's
      // formatting toolbar — Bold, Italic, Heading, Blockquote, etc.
      // Selected: "lorem" + ("<strong>", "</strong>") → "<strong>lorem</strong>"
      // Empty:    cursor + ("<em>", "</em>")          → "<em>|</em>" (caret between)
      window.humanistWrapSelection = function (opening, closing) {
        if (typeof opening !== "string" || typeof closing !== "string") return;
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        if (sel.length > 0) {
          doc.replaceSelection(opening + sel + closing, "around");
        } else {
          var pos = doc.getCursor();
          doc.replaceRange(opening + closing, pos);
          // Place caret between the tags so the user can type into
          // the empty wrapper.
          doc.setCursor({line: pos.line, ch: pos.ch + opening.length});
        }
        editor.focus();
      };

      // Wrap the current selection as a list. Each non-empty
      // newline-separated line becomes a `<li>...</li>`; the whole
      // run is enclosed in `<ul>` or `<ol>`. With nothing selected,
      // inserts a one-item list with the caret inside the empty
      // `<li>`.
      window.humanistWrapAsList = function (listType) {
        if (listType !== "ul" && listType !== "ol") return;
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        var inner;
        if (sel.length > 0) {
          var lines = sel.split("\n")
            .map(function (l) { return l.trim(); })
            .filter(function (l) { return l.length > 0; });
          if (lines.length === 0) lines = [""];
          inner = lines.map(function (l) {
            return "  <li>" + l + "</li>";
          }).join("\n");
        } else {
          inner = "  <li></li>";
        }
        var wrapped = "<" + listType + ">\n" + inner + "\n</" + listType + ">";
        if (sel.length > 0) {
          doc.replaceSelection(wrapped, "around");
        } else {
          var pos = doc.getCursor();
          doc.replaceRange(wrapped, pos);
          // Place caret inside the (empty) first <li>.
          doc.setCursor({line: pos.line + 1, ch: 6});  // "  <li>"
        }
        editor.focus();
      };

      // Insert raw `text` at the cursor (replacing selection if any).
      // Used for self-closing inserts — e.g. <hr/> from the toolbar —
      // where the wrap-with-opening/closing shape doesn't apply.
      window.humanistInsertAtCursor = function (text) {
        if (typeof text !== "string") return;
        editor.replaceSelection(text, "end");
        editor.focus();
      };

      // Apply a casing transform to the current selection. Kinds:
      //   "upper" → UPPERCASE
      //   "lower" → lowercase
      //   "title" → Title Case (every word's first letter capitalized)
      //   "sentence" → Sentence case (first letter of each sentence)
      // No-op if nothing is selected.
      window.humanistTransformSelection = function (kind) {
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        if (sel.length === 0) return;
        var transformed;
        switch (kind) {
          case "upper":
            transformed = sel.toUpperCase();
            break;
          case "lower":
            transformed = sel.toLowerCase();
            break;
          case "title":
            transformed = sel.replace(/\w\S*/g, function (w) {
              return w.charAt(0).toUpperCase() + w.substr(1).toLowerCase();
            });
            break;
          case "sentence":
            transformed = sel.toLowerCase().replace(
              /(^\s*|[.!?]\s+)(\S)/g,
              function (m, lead, c) { return lead + c.toUpperCase(); }
            );
            break;
          default:
            return;
        }
        doc.replaceSelection(transformed, "around");
        editor.focus();
      };

      // Strip every HTML/XHTML tag from the current selection,
      // leaving the inner text. "Selected `<em>foo</em>`" → "foo".
      // Aggressive on purpose: removes ALL tags inside the selection,
      // not just the immediately surrounding pair, so it works even
      // when the selection straddles uneven nesting.
      window.humanistRemoveFormatting = function () {
        var doc = editor.getDoc();
        var sel = doc.getSelection();
        if (sel.length === 0) return;
        var stripped = sel.replace(/<[^>]+>/g, "");
        doc.replaceSelection(stripped, "around");
        editor.focus();
      };

      // Insert a closing tag for the most recent unclosed open tag at
      // the cursor. Walks the source backwards, building a stack of
      // open tags and popping on each close, then emits `</NAME>` for
      // whatever's at the top of the stack. Self-closing tags (`<br/>`,
      // `<hr/>`) are skipped. No-op when nothing is unclosed.
      window.humanistInsertClosingTag = function () {
        var doc = editor.getDoc();
        var pos = doc.getCursor();
        var idx = doc.indexFromPos(pos);
        var before = doc.getValue().substring(0, idx);
        var tagRe = /<\/?(\w+)(?:\s[^>]*)?\/?>/g;
        var stack = [];
        var m;
        while ((m = tagRe.exec(before)) !== null) {
          var tag = m[0];
          var name = m[1];
          if (tag.charAt(tag.length - 2) === "/") continue;  // self-closing
          if (tag.charAt(1) === "/") {
            if (stack.length > 0 && stack[stack.length - 1] === name) {
              stack.pop();
            }
          } else {
            stack.push(name);
          }
        }
        if (stack.length === 0) return;
        var closing = "</" + stack[stack.length - 1] + ">";
        doc.replaceRange(closing, pos);
        editor.focus();
      };

      // Jump cursor to a 1-based line number. Used by Edit > Go to
      // Line. Out-of-range numbers clamp to the document's first/last
      // line so the cursor always lands somewhere sensible.
      window.humanistGotoLine = function (lineNumber) {
        if (typeof lineNumber !== "number" || lineNumber < 1) return;
        var maxLine = editor.lineCount() - 1;
        var target = Math.max(0, Math.min(maxLine, lineNumber - 1));
        editor.setCursor({ line: target, ch: 0 });
        editor.scrollIntoView({ line: target, ch: 0 }, 80);
        editor.focus();
      };

      // Insert a footnote at the cursor: a noteref `<a>` in body
      // position, plus a matching `<aside class="footnote">` skeleton
      // inserted before `</body>` (or appended at end if no body
      // close). Picks the next available `fn-N` numeric id by scanning
      // existing ids in the document. The user fills in the body
      // text — the skeleton gets a placeholder so the user can find
      // the new aside and edit it.
      window.humanistInsertFootnote = function () {
        var doc = editor.getDoc();
        var content = doc.getValue();
        var existing = (content.match(/id="fn-(\d+)"/g) || [])
          .map(function (s) { return parseInt(s.match(/\d+/)[0], 10); });
        var nextId = 1;
        while (existing.indexOf(nextId) !== -1) nextId++;
        var marker = String(nextId);
        var refTag = '<a class="noteref" href="#fn-' + nextId + '">' + marker + '</a>';
        var asideTag = '\n<aside class="footnote" id="fn-' + nextId + '">' + marker + ' </aside>';
        // Insert ref at cursor (preserving any selection by appending
        // ref after it — typical pattern is "select the marker
        // position, click insert").
        var sel = doc.getSelection();
        if (sel.length > 0) {
          doc.replaceSelection(sel + refTag, "around");
        } else {
          var pos = doc.getCursor();
          doc.replaceRange(refTag, pos);
        }
        // Append aside before </body>.
        var refreshed = doc.getValue();
        var bodyEnd = refreshed.lastIndexOf("</body>");
        if (bodyEnd >= 0) {
          var prefix = refreshed.substring(0, bodyEnd);
          var suffix = refreshed.substring(bodyEnd);
          doc.setValue(prefix + asideTag + "\n" + suffix);
        } else {
          // No </body> — append at end of file.
          doc.replaceRange(asideTag, doc.posFromIndex(refreshed.length));
        }
        editor.focus();
      };

      // Replace the entire body of a single page — text between the
      // closing `>` of `<span id="hu-page-N" …>` and the start of
      // `<span id="hu-page-N+1" …>` (or end of body, for the last
      // page). Used by the Re-OCR sheet's "Replace Page in Source"
      // button.
      //
      // `payload` is well-formed XHTML produced by Swift's
      // XHTMLFragmentRenderer (the same renderer EPUBBuilder uses for
      // chapters), so it already has <p> wrappers, language spans,
      // noteref links, etc. We just splice it in verbatim — no need
      // to wrap or escape further. (Earlier versions wrapped each
      // line in <p> here, which produced gibberish on multi-column
      // pages because the OCR text wasn't reflowed.)
      window.humanistReplacePageInSource = function (anchorId, payload) {
        if (!anchorId || typeof payload !== "string") return;
        var doc = editor.getDoc();
        var content = doc.getValue();
        var startNeedles = ['id="' + anchorId + '"', "id='" + anchorId + "'"];
        var startIdx = -1;
        for (var i = 0; i < startNeedles.length; i++) {
          var hit = content.indexOf(startNeedles[i]);
          if (hit >= 0) { startIdx = hit; break; }
        }
        if (startIdx < 0) return;
        // Skip past the opening tag's closing `>` so we don't
        // overwrite the anchor span itself.
        var startEnd = content.indexOf(">", startIdx);
        if (startEnd < 0) return;
        startEnd += 1;
        // Find the next hu-page anchor (any id starting with
        // `hu-page-`) — that's where this page's body ends.
        var nextRe = /<span[^>]*id=["']hu-page-\d+["'][^>]*>/g;
        nextRe.lastIndex = startEnd;
        var nextMatch = nextRe.exec(content);
        var endIdx = nextMatch ? nextMatch.index : content.length;

        // Pad with newlines so the splice sits cleanly between the
        // anchor spans rather than smashed against them.
        var spliced = "\n" + payload.replace(/^\n+|\n+$/g, "") + "\n";
        var startPos = doc.posFromIndex(startEnd);
        var endPos = doc.posFromIndex(endIdx);
        doc.replaceRange(spliced, startPos, endPos);
        editor.focus();
      };

      // Linked-navigation: search the source for the given anchor id
      // (matches `id="hu-page-N"` produced by the converter), move the
      // cursor there, and briefly flash the line so the jump is
      // visible.
      var lastReportedAnchor = null;

      window.humanistScrollToAnchor = function (anchorId) {
        if (!anchorId) return;
        var doc = editor.getDoc();
        var content = doc.getValue();
        // Try double quotes first (the canonical form the XHTML
        // writer emits), then fall back to single quotes for hand-
        // edited files.
        var needles = ['id="' + anchorId + '"', "id='" + anchorId + "'"];
        var idx = -1;
        for (var i = 0; i < needles.length; i++) {
          var hit = content.indexOf(needles[i]);
          if (hit >= 0) { idx = hit; break; }
        }
        if (idx < 0) return;
        var pos = doc.posFromIndex(idx);
        // Move cursor and scroll the target line ~100px from the top
        // so context above the anchor is still visible.
        // Stash the anchor as the most recently reported one so the
        // cursorActivity handler doesn't echo it back as a sync.
        lastReportedAnchor = anchorId;
        doc.setSelection(pos, pos);
        editor.scrollIntoView(pos, 100);
        // Flash the line briefly. CodeMirror's addLineClass returns
        // a handle we use to remove the class after the flash.
        var line = pos.line;
        var handle = doc.addLineClass(line, "background", "hu-flash-line");
        setTimeout(function () {
          if (handle) doc.removeLineClass(handle, "background", "hu-flash-line");
        }, 1100);
      };

      // Code → others sync: when the cursor moves, find the nearest
      // hu-page anchor that appears BEFORE the cursor and report it
      // so the PDF + preview can follow. Suppresses the report when
      // the change is the result of an external scroll (the
      // `lastReportedAnchor` guard).
      var anchorRegex = /id=["']hu-page-(\d+)["']/g;
      function anchorAtCursor() {
        var doc = editor.getDoc();
        var idx = doc.indexFromPos(doc.getCursor());
        var content = doc.getValue();
        // Walk forward through matches, keeping the last one whose
        // starting offset is <= cursor. Faster than .match() then
        // searching backwards for long files.
        anchorRegex.lastIndex = 0;
        var lastId = null;
        var m;
        while ((m = anchorRegex.exec(content)) !== null) {
          if (m.index > idx) break;
          lastId = "hu-page-" + m[1];
        }
        return lastId;
      }
      editor.on("cursorActivity", function () {
        // Always post the cursor offset on every cursor activity —
        // chapter-split needs a fresh value when the user invokes the
        // command, even if the anchor hasn't changed.
        try {
          var doc = editor.getDoc();
          var pos = doc.getCursor();
          post({ type: "cursor-offset", offset: doc.indexFromPos(pos) });
        } catch (e) {
          // Defensive: if indexFromPos throws on a transient state,
          // skip reporting rather than break cursor tracking.
        }
        var current = anchorAtCursor();
        if (!current || current === lastReportedAnchor) return;
        lastReportedAnchor = current;
        post({ type: "cursor-anchor", id: current });
      });

      ready = true;
      post({ type: "ready" });
    })();
  </script>
</body>
</html>
